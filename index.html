      rel="stylesheet"
    />
    <link rel="shortcut icon" href="icon.svg" type="image/x-icon" />
    <style>
      /* Reset & Base Styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        /* Warna latar belakang beige/krem khas Medium */
        background-color: #f7f4ed;
        color: #242424;
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
      }

      /* Header / Navigasi */
      header {
        border-bottom: 1px solid #242424;
        padding: 24px 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: #f7f4ed;
      }

      .logo {
        font-family: "DM Serif Display", serif;
        font-size: 2.7rem;
        letter-spacing: -0.02rem;
      }

      /* Konten Utama (Hero Section) */
      main {
        flex: 1;
        display: flex;
        padding: 90px 40px;
        border-bottom: 1px solid #242424;
      }

      .hero-content {
        max-width: 800px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      h1 {
        font-family: "DM Serif Display", serif;
        font-size: 6.5rem;
        line-height: 0.95;
        letter-spacing: -0.2rem;
        font-weight: normal;
        margin-bottom: 30px;
      }

      p.subtitle {
        font-size: 1.5rem;
        font-weight: 400;
        margin-bottom: 45px;
        color: #242424;
      }

      /* Tombol */
      .btn {
        background-color: oklch(0.648 0.2 131.684);
        color: #ffffff;
        font-family: "Inter", sans-serif;
        font-size: 1.1rem;
        font-weight: 500;
        border: none;
        border-radius: 50px;
        padding: 12px 32px;
        cursor: pointer;
        width: max-content;
        transition: background-color 0.2s ease;
      }

      .btn:hover {
        background-color: oklch(47.931% 0.133 132.693);
      }

      /* Footer */
      footer {
        padding: 20px 40px;
        background-color: #f7f4ed;
        min-height: 80px;
      }

      /* Responsive Design untuk layar kecil */
      @media (max-width: 768px) {
        h1 {
          font-size: 4rem;
          letter-spacing: -0.1rem;
        }
        header,
        main,
        footer {
          padding: 24px 20px;
        }
        main {
          padding-top: 60px;
          padding-bottom: 60px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">Penakita</div>
      <nav></nav>
    </header>

    <main>
      <div class="hero-content">
        <h1>Tulisan, Ide, dan Cerita</h1>
        <p class="subtitle">Tempat berbagi pemikiran melalui tulisan.</p>
        <button class="btn" id="devButton">Sedang Dikembangkan</button>
      </div>

      <div class="hero-image-placeholder"></div>
    </main>

    <footer></footer>

    <script>
      // JS murni sederhana untuk memberikan feedback saat tombol diklik
      document
        .getElementById("devButton")
        .addEventListener("click", function () {
          alert(
            "Penakita saat ini sedang dalam tahap pengembangan. Nantikan pembaruannya!",
          );
        });
    </script>
  </body>
</html>
